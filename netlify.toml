-- ============================================================
-- Insurance Policy & Invoice Database Schema  v2
-- For: Netlify DB (PostgreSQL via Neon)
--
-- Hierarchy (mapped from GRUPO BIMBO.xlsx + diagram):
--
--   pools            →  BIMBOX, BIMBO19, BIMBO-CO, BIMBO-E
--   contractors      →  Individual insured entities (RFC + name)
--   parent_policies  →  PolizaOriginal  ("Póliza Padre")
--   policies         →  PolizaCobranza  ("Póliza")
--   invoices         →  NumRecibo       ("Recibo")
--   payments         →  Bank deposit applications (Aplicación sheet)
-- ============================================================


-- ────────────────────────────────────────────────────────────
-- 1. POOLS
--    Top-level groupings: BIMBOX, BIMBO19, BIMBO-CO, BIMBO-E
-- ────────────────────────────────────────────────────────────
CREATE TABLE pools (
  id          SERIAL PRIMARY KEY,
  code        VARCHAR(50)   UNIQUE NOT NULL,   -- e.g. "BIMBOX", "BIMBO19"
  name        VARCHAR(255),
  created_at  TIMESTAMP     DEFAULT NOW(),
  updated_at  TIMESTAMP     DEFAULT NOW()
);


-- ────────────────────────────────────────────────────────────
-- 2. CONTRACTORS  (Contratantes)
--    Individual insured entities within a pool.
--    RFC is the Mexican tax ID. The same RFC can appear
--    under different legal names (use rfc + name as unique key).
-- ────────────────────────────────────────────────────────────
CREATE TABLE contractors (
  id          SERIAL PRIMARY KEY,
  rfc         VARCHAR(20)   NOT NULL,          -- rfc_contratante
  name        VARCHAR(255)  NOT NULL,          -- Contratante
  created_at  TIMESTAMP     DEFAULT NOW(),
  updated_at  TIMESTAMP     DEFAULT NOW()
);

CREATE UNIQUE INDEX idx_contractors_rfc_name ON contractors(rfc, name);


-- ────────────────────────────────────────────────────────────
-- 3. PARENT POLICIES  (Pólizas Padre = PolizaOriginal)
--    One parent policy per pool/contractor combination.
--    A parent policy can have many child policies.
-- ────────────────────────────────────────────────────────────
CREATE TABLE parent_policies (
  id                SERIAL PRIMARY KEY,
  pool_id           INTEGER       NOT NULL REFERENCES pools(id)        ON DELETE RESTRICT,
  contractor_id     INTEGER       NOT NULL REFERENCES contractors(id)  ON DELETE RESTRICT,
  policy_number     VARCHAR(50)   UNIQUE NOT NULL,   -- PolizaOriginal
  coverage_type     VARCHAR(100),
  insurer           VARCHAR(255),
  start_date        DATE,
  end_date          DATE,
  status            VARCHAR(50)   DEFAULT 'active',  -- active | expired | cancelled
  notes             TEXT,
  created_at        TIMESTAMP     DEFAULT NOW(),
  updated_at        TIMESTAMP     DEFAULT NOW()
);

CREATE INDEX idx_parent_policies_pool        ON parent_policies(pool_id);
CREATE INDEX idx_parent_policies_contractor  ON parent_policies(contractor_id);


-- ────────────────────────────────────────────────────────────
-- 4. POLICIES  (Pólizas = PolizaCobranza)
--    Child policies that belong to a Póliza Padre.
--    Used for billing and collection tracking.
-- ────────────────────────────────────────────────────────────
CREATE TABLE policies (
  id                SERIAL PRIMARY KEY,
  parent_policy_id  INTEGER       NOT NULL REFERENCES parent_policies(id) ON DELETE CASCADE,
  policy_number     VARCHAR(50)   UNIQUE NOT NULL,   -- PolizaCobranza
  coverage_type     VARCHAR(100),
  beneficiary       VARCHAR(255),
  insured_amount    DECIMAL(15,2),
  premium           DECIMAL(15,2),
  start_date        DATE,
  end_date          DATE,
  status            VARCHAR(50)   DEFAULT 'active',  -- active | expired | cancelled | suspended
  notes             TEXT,
  created_at        TIMESTAMP     DEFAULT NOW(),
  updated_at        TIMESTAMP     DEFAULT NOW()
);

CREATE INDEX idx_policies_parent  ON policies(parent_policy_id);


-- ────────────────────────────────────────────────────────────
-- 5. INVOICES / RECEIPTS  (Recibos = NumRecibo)
--    One row per receipt per policy.
--
--    status values (from real data):
--      POR EMITIR  → upcoming, not yet generated  (yellow in UI)
--      EMITIDO     → issued, awaiting payment      (red in UI)
--      PAGADO      → paid in full                  (green in UI)
--
--    Premium breakdown:
--      prima_neta   = base premium before taxes
--      prima_total  = prima_neta + taxes/fees
--      *_emitida    = amount on the issued invoice
--      *_pagada     = amount already collected
--      *_pendiente  = outstanding balance
-- ────────────────────────────────────────────────────────────
CREATE TABLE invoices (
  id                    SERIAL PRIMARY KEY,
  policy_id             INTEGER       NOT NULL REFERENCES policies(id) ON DELETE CASCADE,

  -- Receipt identification
  receipt_number        INTEGER       NOT NULL,             -- NumRecibo (1000, 5000 …)
  endorsement           VARCHAR(20)   DEFAULT '000000',    -- Endoso

  -- Coverage period for this specific receipt
  coverage_start        DATE,                              -- VigenFecIniRecibo
  coverage_end          DATE,                              -- VigenFecFinRecibo

  -- Net premium (before taxes)
  net_premium_issued    DECIMAL(15,2),                     -- PrimaNetaEmit
  net_premium_paid      DECIMAL(15,2)  DEFAULT 0,          -- PrimaNetaPag
  net_premium_pending   DECIMAL(15,2),                     -- PrimaNetaPend

  -- Total premium (including taxes)
  total_premium_issued  DECIMAL(15,2),                     -- PrimaTotalEmit
  total_premium_paid    DECIMAL(15,2)  DEFAULT 0,          -- PrimaTotalPag
  total_premium_pending DECIMAL(15,2),                     -- PrimaTotalPend

  -- Dates
  emission_date         DATE,                              -- FechaEmision
  application_date      DATE,                              -- FechaAplicacion

  -- Status & tax compliance
  status                VARCHAR(20)   DEFAULT 'POR EMITIR', -- POR EMITIR | EMITIDO | PAGADO
  fiscal_folio          VARCHAR(50),                        -- FOLIO_FISCAL (SAT)

  created_at            TIMESTAMP     DEFAULT NOW(),
  updated_at            TIMESTAMP     DEFAULT NOW(),

  UNIQUE(policy_id, receipt_number, endorsement)
);

CREATE INDEX idx_invoices_policy    ON invoices(policy_id);
CREATE INDEX idx_invoices_status    ON invoices(status);
CREATE INDEX idx_invoices_coverage  ON invoices(coverage_start, coverage_end);
CREATE INDEX idx_invoices_emission  ON invoices(emission_date);


-- ────────────────────────────────────────────────────────────
-- 6. PAYMENTS  (Aplicaciones de pago)
--    Tracks actual bank deposits matched to invoices.
--    Source: "Aplicación" and "Bimbox" sheets.
-- ────────────────────────────────────────────────────────────
CREATE TABLE payments (
  id               SERIAL PRIMARY KEY,
  invoice_id       INTEGER       REFERENCES invoices(id) ON DELETE SET NULL,
  policy_number    VARCHAR(50),                   -- NO. POLIZA (denormalized for import)
  receipt_number   INTEGER,                       -- Recibo
  amount           DECIMAL(15,2) NOT NULL,        -- Importe
  payment_date     DATE,                          -- FECHA
  virtual_account  VARCHAR(50),                   -- CUENTA VIRTUAL
  business_name    VARCHAR(255),                  -- NEGOCIO
  total_deposited  DECIMAL(15,2),                 -- MONTO (total for that deposit batch)
  notes            TEXT,                          -- Observaciones
  created_at       TIMESTAMP     DEFAULT NOW()
);

CREATE INDEX idx_payments_invoice  ON payments(invoice_id);
CREATE INDEX idx_payments_date     ON payments(payment_date);


